<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Attendance · Brightline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="spinner"></div></div>

<div class="app-shell">
  <div id="sidebarRoot"></div>
  <div class="main-col">
    <div id="topbarRoot"></div>

    <main class="page">
      <div class="page-head">
        <div><h1>Attendance</h1><p class="desc">Mark and track daily attendance by batch.</p></div>
      </div>

      <div class="card mb-14">
        <div class="card-pad" style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;">
          <div class="field no-icon" style="margin:0;min-width:220px;">
            <label>Batch</label>
            <select id="attBatchSelect"></select>
          </div>
          <div class="field no-icon" style="margin:0;">
            <label>Date</label>
            <input type="date" id="attDate">
          </div>
          <div style="margin-left:auto;display:flex;align-items:center;gap:14px;">
            <div class="text-center">
              <div class="text-faint" style="font-size:11.5px;">Attendance</div>
              <div class="value" style="font-family:var(--font-display);font-weight:800;font-size:22px;color:var(--primary);" id="attPercentLabel">—</div>
            </div>
            <button class="btn btn-primary" id="saveAttendanceBtn"><i class="fa-solid fa-floppy-disk"></i> Save Attendance</button>
          </div>
        </div>
      </div>

      <div class="card card-pad">
        <div class="att-list" id="attList"></div>
        <div class="empty-state" id="attEmpty" style="display:none;">
          <div class="ic"><i class="fa-solid fa-clipboard-check"></i></div>
          <div class="t">No students in this batch</div>
          <div class="d">Add students to this batch to start marking attendance.</div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
<script>
  const user = Auth.guard(null);
  if(user){ initShell('attendance', user); initAttendancePage(user); }
</script>
</body>
</html>
