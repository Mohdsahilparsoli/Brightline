<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Notifications · Brightline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="spinner"></div></div>

<div class="app-shell">
  <div id="sidebarRoot"></div>
  <div class="main-col">
    <div id="topbarRoot"></div>

    <main class="page">
      <div class="page-head">
        <div><h1>Notifications</h1><p class="desc">Send reminders and messages to students or batches.</p></div>
      </div>

      <div class="grid grid-2">
        <div class="card card-pad">
          <h3 style="font-size:14.5px;font-weight:700;margin-bottom:16px;">Compose message</h3>
          <form id="notifForm">
            <div class="field no-icon">
              <label>Send to</label>
              <select id="notifTarget"></select>
            </div>
            <div class="field no-icon mt-14">
              <label>Message</label>
              <textarea id="notifMessage" rows="5" placeholder="e.g. Reminder: fees for this month are due by the 25th." style="width:100%;padding:11px 13px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:14px;resize:vertical;"></textarea>
            </div>
            <button type="submit" class="btn btn-primary btn-block"><i class="fa-solid fa-paper-plane"></i> Send Reminder</button>
          </form>
        </div>

        <div class="card">
          <div class="card-head"><h3>Sent History</h3></div>
          <div class="activity-feed" id="notifHistory"></div>
        </div>
      </div>
    </main>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
<script>
  const user = Auth.guard(null);
  if(user){ initShell('notifications', user); initNotificationsPage(user); }
</script>
</body>
</html>
