<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fees · Brightline</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="css/theme.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="page-loader" id="pageLoader"><div class="spinner"></div></div>

<div class="app-shell">
  <div id="sidebarRoot"></div>
  <div class="main-col">
    <div id="topbarRoot"></div>

    <main class="page">
      <div class="page-head">
        <div><h1>Fees Management</h1><p class="desc">Track payments and outstanding balances per student.</p></div>
      </div>

      <div class="toolbar">
        <div class="left-tools">
          <div class="search-wrap" style="max-width:260px;">
            <i class="fa-solid fa-magnifying-glass"></i>
            <input type="text" id="feeSearch" placeholder="Search student...">
          </div>
          <select class="filter-select" id="feeStatusFilter">
            <option value="all">All statuses</option>
            <option value="Paid">Paid</option>
            <option value="Partial">Partial</option>
            <option value="Pending">Pending</option>
          </select>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead><tr><th>Student</th><th>Total Fees</th><th>Paid</th><th>Pending</th><th>Status</th><th>Action</th></tr></thead>
          <tbody id="feesTbody"></tbody>
        </table>
      </div>
      <div class="empty-state" id="feesEmpty" style="display:none;">
        <div class="ic"><i class="fa-solid fa-sack-dollar"></i></div>
        <div class="t">No records match</div>
        <div class="d">Try a different search or status filter.</div>
      </div>
    </main>
  </div>
</div>

<div class="modal-backdrop" id="paymentModal">
  <div class="modal">
    <div class="modal-head"><h3>Record Payment</h3><button class="btn-icon" onclick="closeModal('paymentModal')"><i class="fa-solid fa-xmark"></i></button></div>
    <form id="paymentForm">
      <div class="modal-body">
        <input type="hidden" id="paymentStudentId">
        <p style="font-size:14px;">Student: <b id="paymentModalName"></b></p>
        <p class="text-soft" style="font-size:12.5px;margin-top:4px;">Remaining balance: <span id="paymentModalRemaining"></span></p>
        <div class="form-grid mt-14">
          <div class="field no-icon"><label>Amount (₹)</label><input type="number" id="paymentAmount" min="1" required></div>
          <div class="field no-icon"><label>Payment mode</label>
            <select id="paymentMode">
              <option>Cash</option><option>UPI</option><option>Card</option><option>Bank Transfer</option>
            </select>
          </div>
        </div>
      </div>
      <div class="modal-foot">
        <button type="button" class="btn btn-ghost" onclick="closeModal('paymentModal')">Cancel</button>
        <button type="submit" class="btn btn-primary">Add Payment</button>
      </div>
    </form>
  </div>
</div>

<script src="js/storage.js"></script>
<script src="js/auth.js"></script>
<script src="js/ui.js"></script>
<script src="js/charts.js"></script>
<script src="js/app.js"></script>
<script>
  const user = Auth.guard('admin');
  if(user){ initShell('fees', user); initFeesPage(user); }
</script>
</body>
</html>
